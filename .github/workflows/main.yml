name: Pipeline DevSecOps - Spring PetClinic App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: petclinic-app

jobs:
  # ----------------------------------------------------
  # 1. BUILD MAVEN & TESTS UNITAIRES
  # ----------------------------------------------------
  build-and-test:
    name: 1. Build Maven & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build et execution des tests unitaires
        run: mvn -B verify

  # ----------------------------------------------------
  # 2. SCANS DE SÉCURITÉ & VULNÉRABILITÉS
  # ----------------------------------------------------
  security-scans:
    name: 2. Scans de Securite (IaC & Container)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Scan IaC avec tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          soft_fail: true

  # ----------------------------------------------------
  # 3. BUILD DOCKER & PUSH ECR
  # ----------------------------------------------------
  build-and-push-ecr:
    name: 3. Build & Push Image vers AWS ECR
    runs-on: ubuntu-latest
    needs: security-scans
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration des identifiants AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Connexion a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build local de l'image Docker
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .

      - name: Scan de l'image Docker avec Trivy (Security Gate)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Push des images vers AWS ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
